{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0 text-center"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success rounded-pill fw-bold py-2">Sign In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
                Don't have an account? <a href="{% url 'register' %}" class="text-success text-decoration-none fw-bold">Sign up today</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
